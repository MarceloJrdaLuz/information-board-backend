name: Clean publisher reminders

on:
  schedule:
    - cron: '0 4 * * 4' # toda quinta às 01:00 BRT
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: Call cleanup route
        run: |
          curl -s -L -X DELETE ${{ secrets.API_URL }}/cron/clean-publisher-reminders \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET_GITHUB }}" \
            -H "Cache-Control: no-cache"